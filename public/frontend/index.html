<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Manajemen Sekolah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:40px;
}

.container{
width:1000px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
margin-bottom:25px;
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
}

h3{
margin-bottom:10px;
color:#333;
}

input{
padding:10px;
margin:5px;
width:220px;
border-radius:8px;
border:1px solid #ddd;
transition:0.3s;
}

input:focus{
border-color:#667eea;
box-shadow:0 0 6px rgba(102,126,234,0.4);
outline:none;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.btn-add{
background:#27ae60;
color:white;
}

.btn-add:hover{
background:#1e8449;
transform:scale(1.05);
}

.btn-refresh{
background:#3498db;
color:white;
}

.btn-refresh:hover{
background:#21618c;
}

.btn-detail{
background:#f39c12;
color:white;
}

.btn-detail:hover{
background:#d68910;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#667eea;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#f2f2ff;
}

.icon{
margin-right:5px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:12px;
width:420px;
animation:pop 0.3s ease;
}

@keyframes pop{
from{
transform:scale(0.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body>

<h1>📚 Sistem Manajemen Sekolah</h1>

<div class="container">

<div class="card">

<h3>Tambah Data Sekolah</h3>

<input type="text" id="nama_sekolah" placeholder="Nama Sekolah">
<input type="text" id="alamat" placeholder="Alamat">
<input type="text" id="kepala_sekolah" placeholder="Kepala Sekolah">
<input type="text" id="email" placeholder="Email">

<br><br>

<button class="btn-add" onclick="tambahData()">
<i class="fa fa-plus icon"></i>Tambah Data
</button>

</div>

<div class="card">

<h3>Data Sekolah</h3>

<button class="btn-refresh" onclick="loadData()">
<i class="fa fa-sync icon"></i>Refresh
</button>

<table>

<thead>

<tr>
<th>ID</th>
<th>Nama Sekolah</th>
<th>Alamat</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tableSekolah">

</tbody>

</table>

</div>

</div>

<div id="modalDetail" class="modal">

<div class="modal-box">

<span class="close">&times;</span>

<h2>Detail Sekolah</h2>

<div id="detailContent"></div>

</div>

</div>

<script>

function loadData(){

$.ajax({

url:"http://127.0.0.1:8000/api/sekolah",

method:"GET",

success:function(data){

$("#tableSekolah").html("");

data.forEach(function(item){

$("#tableSekolah").append(

"<tr>"+

"<td>"+item.id+"</td>"+

"<td>"+item.nama_sekolah+"</td>"+

"<td>"+item.alamat+"</td>"+

"<td><button class='btn-detail' onclick='detailData("+item.id+")'><i class='fa fa-eye'></i> Detail</button></td>"+

"</tr>"

);

});

}

});

}

function tambahData(){

$.ajax({

url:"http://127.0.0.1:8000/api/sekolah",

method:"POST",

data:{

nama_sekolah:$("#nama_sekolah").val(),

alamat:$("#alamat").val(),

kepala_sekolah:$("#kepala_sekolah").val(),

email:$("#email").val()

},

success:function(){

alert("Data berhasil ditambahkan");

loadData();

}

});

}

function detailData(id){

$.ajax({

url:"http://127.0.0.1:8000/api/sekolah/"+id,

method:"GET",

success:function(data){

$("#detailContent").html(

"<p><b>ID :</b> "+data.id+"</p>"+

"<p><b>Nama Sekolah :</b> "+data.nama_sekolah+"</p>"+

"<p><b>Alamat :</b> "+data.alamat+"</p>"+

"<p><b>Kepala Sekolah :</b> "+data.kepala_sekolah+"</p>"+

"<p><b>Email :</b> "+data.email+"</p>"

);

$("#modalDetail").css("display","flex");

}

});

}

$(".close").click(function(){

$("#modalDetail").hide();

});

$(window).click(function(e){

if(e.target.id=="modalDetail"){

$("#modalDetail").hide();

}

});

</script>

</body>
</html>
